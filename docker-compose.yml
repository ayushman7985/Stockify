services:
  db:
    image: postgres:16
    container_name: stockify_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stockify_db
    ports:
      - "5420:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: stockify_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: stockify_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: